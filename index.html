<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Frota Nuvem</title>
	<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <style>
	/* Alertas e Status de Conexão Offline/Online */
        .status-conexao { padding: 10px; text-align: center; font-weight: bold; font-size: 14px; display: none; }
        .status-online { background-color: #2ecc71; color: white; }
        .status-offline { background-color: #e67e22; color: white; }
        .badge-pendente { background-color: #7f8c8d; position: absolute; top: 15px; right: 15px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #2c3e50; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: #b0bec5; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn:hover { background: #34495e; color: #fff; }
        .tab-btn.active { color: #fff; border-bottom: 3px solid #3498db; background: #1a252f; }
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }
        h2 { margin-bottom: 20px; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        input:disabled, select:disabled { background-color: #e9ecef; cursor: not-allowed; }
        .info-km-anterior { background-color: #e8f4fd; border-left: 4px solid #3498db; padding: 10px; margin-bottom: 15px; font-size: 14px; font-weight: 500; color: #2c3e50; display: none; }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        .camera-container { text-align: center; margin: 20px 0; background: #e9ecef; padding: 15px; border-radius: 6px; }
        video, canvas { width: 100%; max-width: 400px; border-radius: 4px; background: #000; display: block; margin: 0 auto 10px auto; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #2980b9; }
        .btn-capture { background-color: #2ecc71; margin-bottom: 10px; }
        .filtros-box { background: #f8f9fa; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .registro-card { background: #fff; border: 1px solid #e2e8f0; border-left: 5px solid #3498db; padding: 15px; margin-bottom: 15px; border-radius: 4px; position: relative; }
        .badge { display: inline-block; padding: 3px 8px; font-size: 12px; font-weight: bold; border-radius: 3px; color: white; margin-bottom: 5px; }
        .badge-saida { background-color: #e67e22; }
        .badge-chegada { background-color: #2ecc71; }
        .registro-card img { max-width: 150px; display: block; margin-top: 10px; border-radius: 4px; border: 1px solid #ddd; }
        .error-message { color: #e74c3c; font-size: 14px; margin-top: 5px; display: none; font-weight: bold; }
        .loading-msg { text-align: center; font-style: italic; color: #7f8c8d; padding: 10px; }
		/* Estilo para a Logomarca no topo */
        .logo-container {
            text-align: center; /* Centraliza a logo */
            margin-bottom: 10px; /* Dá um espaço entre a logo e o título */
        }

        .logo-container img {
            max-width: 70px; /* Define a largura máxima da logo (ajuste como preferir) */
            height: auto; /* Mantém a proporção da imagem */
            object-fit: contain;
        }
    </style>
</head>

    <div class="tabs">
        <button class="tab-btn active" onclick="mudarAba('registrar')">Registrar Movimentação Frota</button>
        <button class="tab-btn" onclick="mudarAba('historico')">Histórico (Nuvem)</button>
    </div>
    
    <div id="aba-registrar" class="tab-content active">
        <h2>Novo Registro</h2>
        <form id="frotaForm">
            <div class="form-group">
                <label for="veiculo">Veículo (Placa)</label>
                <select id="veiculo" required onchange="atualizarKmAnterior()">
                    <option value="">Selecione o veículo...</option>
                    <option value="OHV-4E83 (Effa Cab.Simples)">OHV-4E83 (Effa Cab.Simples)</option>
                    <option value="QTG-3A83 (Effa Cab.Dupla)">QTG-3A83 (Effa Cab.Dupla)</option>
                    <option value="QTB-6C17 (Mobi)">QTB-6C17 (Mobi)</option>
                    <option value="RVG-6F56 (Mobi Vendedor)">RVG-6F56 (Mobi Vendedor)</option>
                    <option value="RPY-9G64 (Caminhão VW BRANCO)">RPY-9G64 (Caminhão VW BRANCO)</option>
                </select>
            </div>

            <div id="infoKmAnterior" class="info-km-anterior">Carregando dados da nuvem...</div>

            <div class="form-group">
                <label for="motorista">Motorista</label>
                <select id="motorista" required>
                    <option value="">Selecione o motorista...</option>
                    <option value="Alcendino">Alcendino</option>
                    <option value="Alex">Alex</option>
                    <option value="Alisson">Alisson</option>
                    <option value="Ariclenes">Ariclenes</option>
                    <option value="Charles">Charles</option>
                    <option value="Francisco">Francisco</option>
                    <option value="Gabriel Flores">Gabriel Flores</option>
                    <option value="Gilberto">Gilberto</option>
                    <option value="Guilherme">Guilherme</option>
                    <option value="Helberlin">Helberlin</option>
                    <option value="Hellgton">Hellgton</option>
                    <option value="Isaak">Isaak</option>
                    <option value="Jocimar">Jocimar</option>
                    <option value="Josimar Santana">Josimar Santana</option>
                    <option value="Marcio">Marcio</option>
                    <option value="Merival">Merival</option>
                    <option value="Tauã">Tauã</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipoRegistro">Tipo de Registro</label>
                <select id="tipoRegistro" required onchange="alternarCamposKm()">
                    <option value="">Selecione o tipo...</option>
                    <option value="Saída">Saída</option>
                    <option value="Chegada">Chegada</option>
                </select>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="kmSaida">KM Saída</label>
                    <input type="number" id="kmSaida" min="0" disabled placeholder="Bloqueado">
                </div>
                <div class="form-group">
                    <label for="kmChegada">KM Chegada</label>
                    <input type="number" id="kmChegada" min="0" disabled placeholder="Bloqueado">
                    <div id="kmError" class="error-message">O KM de chegada não pode ser menor que o último KM registrado!</div>
                </div>
            </div>

            <div class="camera-container">
                <label>Foto do Registro</label>
                <video id="video" autoplay playsinline></video>
                <button type="button" class="btn-capture" id="btnCapturar">Tirar Foto</button>
                <canvas id="canvas" style="display:none;"></canvas>
                <div id="fotoStatus" style="font-size: 14px; color: #7f8c8d;">Nenhuma foto tirada</div>
            </div>

            <button type="submit" id="btnSalvar">Salvar Registro na Nuvem</button>
        </form>
    </div>

    <div id="aba-historico" class="tab-content">
        <h2>Histórico Sincronizado</h2>
        <div class="filtros-box">
            <div class="form-group">
                <label for="buscaMotorista">Buscar por Motorista</label>
                <input type="text" id="buscaMotorista" placeholder="Digite o nome do motorista...">
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="buscaData">Filtrar por Data</label>
                    <input type="date" id="buscaData">
                </div>
            </div>
        </div>
        <div id="listaRegistros">
            <p class="loading-msg">Carregando registros da nuvem...</p>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ESCREVA A SUA URL DO GOOGLE SCRIPT AQUI ABAIXO:
    // ==========================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhn4Mz-xQmfKzdV9V6M3h5kTMLrodC0JcIlguwMd_BX2xwMkRZL5x5CaR8zbMPEKTDoQ/exec";

	// Inicializa o Banco de Dados Local (IndexedDB) no aparelho do usuário
    const db = new Dexie("FrotaDB");
    db.version(1).stores({
        pendentes: "++id, veiculo, motorista, tipo, kmSaida, kmChegada, foto, dataHora",
        cacheHistorico: "dataHora, veiculo, motorista, tipo, kmSaida, kmChegada, foto"
    });
	
    let bancoDadosRegistros = []; 
    let fotoDataUrl = null;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const btnCapturar = document.getElementById('btnCapturar');
    const fotoStatus = document.getElementById('fotoStatus');
    const form = document.getElementById('frotaForm');
    const listaRegistros = document.getElementById('listaRegistros');
    const kmError = document.getElementById('kmError');
    const infoKmAnterior = document.getElementById('infoKmAnterior');
    const btnSalvar = document.getElementById('btnSalvar');

    const inputKmSaida = document.getElementById('kmSaida');
    const inputKmChegada = document.getElementById('kmChegada');
    const selectTipo = document.getElementById('tipoRegistro');
    const selectVeiculo = document.getElementById('veiculo');
    const buscaMotorista = document.getElementById('buscaMotorista');
    const buscaData = document.getElementById('buscaData');

    // Ao carregar a página, baixa os dados já salvos na planilha
    const barraConexao = document.getElementById('barraConexao');

    window.onload = async () => {
        atualizarStatusConexao();
        await carregarDadosLocais(); 
        carregarDadosDaNuvem(); 
        inicializarCamera();
    };

    // Monitora a internet em tempo real
    window.addEventListener('online', () => { atualizarStatusConexao(); sincronizarPendentes(); });
    window.addEventListener('offline', () => { atualizarStatusConexao(); });

    function atualizarStatusConexao() {
        if (navigator.onLine) {
            barraConexao.textContent = "🌐 DISPOSITIVO ONLINE";
            barraConexao.className = "status-conexao status-online";
            barraConexao.style.display = "block";
            setTimeout(() => barraConexao.style.display = "none", 3000); 
        } else {
            barraConexao.textContent = "⚠️ DISPOSITIVO OFFLINE (Modo de Sincronização Ativo)";
            barraConexao.className = "status-conexao status-offline";
            barraConexao.style.display = "block";
        }
    }

    function inicializarCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { console.error("Erro na câmera: ", err); });
    }

    function mudarAba(aba) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

        if (aba === 'registrar') {
            document.getElementById('aba-registrar').classList.add('active');
            event.currentTarget.classList.add('active');
        } else if (aba === 'historico') {
            document.getElementById('aba-historico').classList.add('active');
            event.currentTarget.classList.add('active');
            carregarDadosDaNuvem(); 
        }
    }

    btnCapturar.addEventListener('click', () => {
        const context = canvas.getContext('2d');
        
        // Define uma resolução máxima discreta e leve (ex: 800x600 pixels)
        const maxLargura = 800;
        const proporcao = video.videoHeight / video.videoWidth;
        
        canvas.width = maxLargura;
        canvas.height = maxLargura * proporcao;
        
        // Desenha a imagem redimensionada no canvas
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // O SEGREDO: 'image/jpeg' com qualidade 0.6 (compacta 40% do peso sem perder nitidez)
        fotoDataUrl = canvas.toDataURL('image/jpeg', 0.6); 
        
        fotoStatus.textContent = "📸 Foto capturada e otimizada!";
        fotoStatus.style.color = "#2ecc71";
    });

   // Carrega o que está salvo no cache local do aparelho para abrir rápido
    async function carregarDadosLocais() {
        const cache = await db.cacheHistorico.toArray();
        const pendentes = await db.pendentes.toArray();
        
        // Junta o cache da nuvem com os que ainda estão esperando internet para subir
        bancoDadosRegistros = [...pendentes.map(p => ({...p, pendente: true})), ...cache];
        bancoDadosRegistros.sort((a,b) => new Date(b.dataHora) - new Date(a.dataHora));
        renderizarRegistros();
        atualizarKmAnterior();
    }

    // Busca dados atualizados do Google Sheets (se tiver internet)
    function carregarDadosDaNuvem() {
        if (!navigator.onLine || SCRIPT_URL.includes("SUA_URL_DO_GOOGLE")) return;

        fetch(SCRIPT_URL)
            .then(response => response.json())
            .then(async (data) => {
                // Limpa o cache antigo e salva o novo histórico vindo da nuvem
                await db.cacheHistorico.clear();
                await db.cacheHistorico.bulkAdd(data);
                await carregarDadosLocais(); 
            })
            .catch(err => console.error("Erro ao sincronizar histórico da nuvem:", err));
    }

    function obterUltimoKm(veiculoSelecionado) {
        const registrosDoVeiculo = bancoDadosRegistros.filter(reg => reg.veiculo === veiculoSelecionado);
        if (registrosDoVeiculo.length > 0) {
            const ultimo = registrosDoVeiculo[0];
            return ultimo.kmSaida ? ultimo.kmSaida : ultimo.kmChegada;
        }
        return 0;
    }

    function atualizarKmAnterior() {
        const veiculo = selectVeiculo.value;
        if (!veiculo) {
            infoKmAnterior.style.display = 'none';
            return;
        }
        const ultimoKm = obterUltimoKm(veiculo);
        infoKmAnterior.textContent = `ℹ️ Último KM registrado para este veículo: ${ultimoKm} km`;
        infoKmAnterior.style.display = 'block';
        alternarCamposKm();
    }

    function alternarCamposKm() {
        const tipo = selectTipo.value;
        inputKmSaida.disabled = true; inputKmChegada.disabled = true;
        inputKmSaida.required = false; inputKmChegada.required = false;

        if (tipo === 'Saída') {
            inputKmSaida.disabled = false; inputKmSaida.required = true;
            inputKmChegada.value = ""; 
        } else if (tipo === 'Chegada') {
            inputKmChegada.disabled = false; inputKmChegada.required = true;
            inputKmSaida.value = "";
        }
    }

    // Envia os dados do formulário para a planilha via POST (Atualizado com Sincronização)
    form.addEventListener('submit', async (e) => { // Adicionado 'async' aqui no início
        e.preventDefault();

        if (SCRIPT_URL.includes("SUA_URL_DO_GOOGLE")) {
            alert("Por favor, configure a URL do seu Google Script na linha 169 do código!");
            return;
        }

        const veiculo = selectVeiculo.value;
        const motorista = document.getElementById('motorista').value;
        const tipo = selectTipo.value;
        const ultimoKmRegistrado = obterUltimoKm(veiculo);

        let kmSaida = null;
        let kmChegada = null;
        kmError.style.display = 'none';

        if (tipo === 'Saída') {
            kmSaida = parseInt(inputKmSaida.value);
        } else if (tipo === 'Chegada') {
            kmChegada = parseInt(inputKmChegada.value);
            if (kmChegada < ultimoKmRegistrado) {
                kmError.textContent = `O KM de chegada não pode ser menor que o último registro (${ultimoKmRegistrado} km)!`;
                kmError.style.display = 'block';
                inputKmChegada.focus();
                return;
            }
        }

        btnSalvar.disabled = true;
        btnSalvar.textContent = "Salvando...";

        let base64Puro = null;
        if (fotoDataUrl) {
            // Remove o prefixo "data:image/png;base64," para enviar apenas os caracteres da imagem ao Drive
            base64Puro = fotoDataUrl.split(',')[1]; 
        }

        const novoRegistro = {
            veiculo,
            motorista,
            tipo,
            kmSaida,
            kmChegada,
            foto: base64Puro, // Envia o texto limpo para virar JPG no servidor
            dataHora: new Date().toISOString()
        };

        // ========================================================
        // PARTE ALTERADA: SALVA LOCALMENTE E SINCRONIZA
        // ========================================================
        try {
            // 1. Salva IMEDIATAMENTE no banco interno offline do aparelho
            await db.pendentes.add(novoRegistro);
            
            // 2. Limpa a tela para o próximo motorista usar
            form.reset();
            alternarCamposKm();
            infoKmAnterior.style.display = 'none';
            fotoDataUrl = null;
            fotoStatus.textContent = "Nenhuma foto tirada";
            fotoStatus.style.color = "#7f8c8d";

            // 3. Atualiza a lista visual na tela com o novo card pendente
            await carregarDadosLocais(); 

            // 4. Decide se sincroniza agora ou se avisa que está offline
            if (navigator.onLine) {
                sincronizarPendentes(); // Se tem internet, já envia na hora de forma transparente
                alert("Registro salvo! Sincronizando com a nuvem...");
            } else {
                alert("Sem internet! O registro ficou guardado no aparelho e subirá automaticamente assim que houver conexão.");
            }
        } catch (err) {
            console.error("Erro ao salvar localmente:", err);
            alert("Erro crítico ao tentar salvar o registro no aparelho.");
        } finally {
            btnSalvar.disabled = false;
            btnSalvar.textContent = "Salvar Registro";
        }
    });
	// FUNÇÃO QUE ENVIA DADOS PENDENTES PARA O GOOGLE SHEETS
    async function sincronizarPendentes() {
        if (!navigator.onLine || SCRIPT_URL.includes("SUA_URL_DO_GOOGLE")) return;

        const pendentes = await db.pendentes.toArray();
        if (pendentes.length === 0) return;

        for (let reg of pendentes) {
            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(reg)
                });
                await db.pendentes.delete(reg.id); // Remove do celular se subiu com sucesso
            } catch (err) {
                console.error("Falha ao subir registro id " + reg.id, err);
                break; // Para se a internet cair de novo no meio
            }
        }
        carregarDadosDaNuvem();
    }
  function renderizarRegistros() {
        listaRegistros.innerHTML = "";
        const termoMotorista = buscaMotorista.value.toLowerCase();
        const termoData = buscaData.value; // Formato retornado: "AAAA-MM-DD"

        const registrosFiltrados = bancoDadosRegistros.filter(reg => {
            const bateMotorista = reg.motorista.toLowerCase().includes(termoMotorista);
            
            let bateData = true;
            if (termoData && reg.dataHora) {
                // Cria um objeto de data com base no registro
                const dataObj = new Date(reg.dataHora);
                
                // Extrai o Ano, Mês e Dia considerando o fuso horário local do aparelho
                const ano = dataObj.getFullYear();
                const mes = String(dataObj.getMonth() + 1).padStart(2, '0'); // Mês começa em 0
                const dia = String(dataObj.getDate()).padStart(2, '0');
                
                // Monta no mesmo formato do input do filtro: "AAAA-MM-DD"
                const dataRegFormatada = `${ano}-${mes}-${dia}`;
                
                // Faz a comparação exata apenas da data (ignorando as horas)
                bateData = (dataRegFormatada === termoData);
            }
            
            return bateMotorista && bateData;
        });

        // ... O restante do código da função (if (registrosFiltrados.length === 0) ...) continua exatamente igual abaixo

        if (registrosFiltrados.length === 0) {
            listaRegistros.innerHTML = '<p style="color: #7f8c8d; text-align: center; padding: 20px;">Nenhum registro encontrado.</p>';
            return;
        }

        registrosFiltrados.forEach(reg => {
            const card = document.createElement('div');
            card.className = 'registro-card';
            const badgeClass = reg.tipo === 'Saída' ? 'badge-saida' : 'badge-chegada';
            const kmExibido = reg.tipo === 'Saída' ? `${reg.kmSaida} km (Saída)` : `${reg.kmChegada} km (Chegada)`;
			// Mostra aviso se o registro estiver preso no celular esperando sinal
            let badgePendente = reg.pendente ? `<span class="badge badge-pendente">Aguardando Conexão</span>` : '';
            
            // ALTERAÇÃO AQUI: Como agora 'reg.foto' armazena um link do Drive, geramos um link clicável ou imagem
            let fotoHtml = (reg.foto && reg.foto.startsWith("http")) 
                ? `<p style="margin-top:8px;"><a href="${reg.foto}" target="_blank" style="color:#3498db; font-weight:600;">📁 Ver Foto Original no Drive</a></p>` 
                : '<p style="color:#bdc3c7; font-size:13px; margin-top:5px;">Sem foto anexada.</p>';

          // Tratamento e formatação da data antes de inserir no HTML
            let dataFormatada = 'N/A';
            if (reg.dataHora) {
                const dataObj = new Date(reg.dataHora);
                dataFormatada = dataObj.toLocaleString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            card.innerHTML = `
                <span class="badge ${badgeClass}">${reg.tipo.toUpperCase()}</span>
                ${badgePendente}
                <p><strong>Veículo:</strong> ${reg.veiculo}</p>
                <p><strong>Motorista:</strong> ${reg.motorista}</p>
                <p><strong>Quilometragem Informada:</strong> ${kmExibido}</p>
                ${fotoHtml}
                <small style="color: #95a5a6; display:block; margin-top:8px;">Data: ${dataFormatada}</small>
            `;
            listaRegistros.appendChild(card);
        });
    }

    buscaMotorista.addEventListener('input', renderizarRegistros);
    buscaData.addEventListener('change', renderizarRegistros);
</script>
